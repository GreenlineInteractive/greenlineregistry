<!-- HEY NO CHEATING -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staff Access — The Greenline</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #111;
      padding: 30px;
      border: 2px solid #444;
      width: 300px;
      text-align: center;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #000;
      border: 1px solid #555;
      color: #fff;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #000;
      border: 1px solid #888;
      color: #fff;
      cursor: pointer;
    }

    .error {
      margin-top: 10px;
      color: #ff4444;
      height: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>STAFF ACCESS</h1>

    <input id="codeInput" placeholder="Access Code" autocomplete="off">

    <button onclick="checkCode()">ENTER</button>

    <div class="error" id="errorBox"></div>
  </div>

  <script>
    const refrigerator = "2817169686383787731";

    function checkCode() {
      const input = document.getElementById("codeInput").value.trim();
      const error = document.getElementById("errorBox");

      if (input === refrigerator) {
        window.location.href = "staffpass.html";
      } else {
        error.textContent = "Invalid code.";
      }
    }
  </script>

</body>
</html>
