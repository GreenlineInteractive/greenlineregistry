<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Greenline Registry</title>
  <style>
    body {
      background: #f2f2f2;
      font-family: Arial, sans-serif;
      color: #000;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .banner {
      width: 100%;
      max-width: 900px;
      margin: 20px auto;
      border: 3px solid #000;
      background: linear-gradient(to right, #00aaff, #66ddff);
      padding: 20px;
      font-size: 32px;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px #000;
    }

    .content {
      margin-top: 40px;
      font-size: 18px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }

    .signup-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 40px;
      background: #ffcc00;
      border: 3px solid #000;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 4px 4px #000;
    }

    .signup-btn:active {
      box-shadow: 1px 1px #000;
      transform: translate(3px, 3px);
    }

    .spacer {
      height: 300px;
    }

    .footer {
      font-size: 10px;
      color: #555;
      margin-bottom: 20px;
    }

    .footer a {
      color: #555;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="banner">
    THE GREENLINE REGISTRY
  </div>

  <div class="content">
    <p>Welcome to the official Greenline Registration Portal!</p>
    <p>Think you have what it takes to compete in the next season?</p>
    <p>Sign up below to begin your journey!</p>

    <div class="signup-btn">
      SIGN UP NOW!
    </div>
  </div>

  <div class="spacer"></div>

  <div class="footer">
    <a href="staffpage.html">Staff Login</a>
  </div>

</body>
</html>
