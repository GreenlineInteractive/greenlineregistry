<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Greenline Registry</title>
  <style>
    body {
      margin: 0;
      background: #ffffff;
      color: #111;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 40px;
      background: #f7f7f7;
      border: 1px solid #ccc;
      width: 350px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      letter-spacing: 3px;
      margin-bottom: 25px;
      color: #009944;
      text-shadow: 0 0 4px rgba(0,150,60,0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #fff;
      border: 1px solid #888;
      color: #111;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 1px;
    }

    button:hover {
      border-color: #009944;
      color: #009944;
      box-shadow: 0 0 10px rgba(0,150,60,0.2);
    }

    .closed-message {
      margin-top: 15px;
      color: #cc0000;
      font-size: 14px;
      height: 20px;
    }

    .small-footer {
      text-align: center;
      font-size: 10px;
      color: #777;
      margin-bottom: 20px;
    }

    .small-footer a {
      color: #777;
      text-decoration: none;
    }

    .small-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>GREENLINE REGISTRY</h1>

    <button onclick="showClosed()">REGISTER</button>

    <div class="closed-message" id="closedBox"></div>

   
  </div>

  <div class="small-footer">
    <a href="staffpage.html">Staff Login</a>
  </div>

  <script>
    function showClosed() {
      const box = document.getElementById("closedBox");
      box.textContent = "Registration for Season 13 is closed.";
    }
  </script>

</body>
</html>
